services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sophrosync
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      # Passed to init.sh for per-service user creation
      CLIENTS_DB_PASSWORD: ${CLIENTS_DB_PASSWORD}
      CONSENT_DB_PASSWORD: ${CONSENT_DB_PASSWORD}
      NOTES_DB_PASSWORD: ${NOTES_DB_PASSWORD}
      NOTIFICATIONS_DB_PASSWORD: ${NOTIFICATIONS_DB_PASSWORD}
      REPORTING_DB_PASSWORD: ${REPORTING_DB_PASSWORD}
      SCHEDULE_DB_PASSWORD: ${SCHEDULE_DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sophrosync"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
      - ./keycloak/themes:/opt/keycloak/themes
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
