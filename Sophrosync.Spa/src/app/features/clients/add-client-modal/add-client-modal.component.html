<div class="modal-backdrop" (click)="onCancel()" aria-hidden="true"></div>

<div class="modal" role="dialog" aria-modal="true" aria-labelledby="add-client-title">
  <h2 class="modal__title" id="add-client-title">Add Client</h2>

  <form class="modal__form" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
    <div class="modal__field">
      <label class="modal__label" for="add-name">Full name</label>
      <input
        id="add-name"
        class="modal__input"
        type="text"
        formControlName="name"
        autocomplete="name"
        [class.modal__input--error]="form.controls.name.invalid && form.controls.name.touched"
      />
      @if (form.controls.name.invalid && form.controls.name.touched) {
        <p class="modal__error">Name is required.</p>
      }
    </div>

    <div class="modal__field">
      <label class="modal__label" for="add-email">Email</label>
      <input
        id="add-email"
        class="modal__input"
        type="email"
        formControlName="email"
        autocomplete="email"
        [class.modal__input--error]="form.controls.email.invalid && form.controls.email.touched"
      />
      @if (form.controls.email.invalid && form.controls.email.touched) {
        <p class="modal__error">A valid email is required.</p>
      }
    </div>

    <div class="modal__field">
      <label class="modal__label" for="add-phone">Phone</label>
      <input
        id="add-phone"
        class="modal__input"
        type="tel"
        formControlName="phone"
        autocomplete="tel"
        [class.modal__input--error]="form.controls.phone.invalid && form.controls.phone.touched"
      />
      @if (form.controls.phone.invalid && form.controls.phone.touched) {
        <p class="modal__error">Phone is required.</p>
      }
    </div>

    <div class="modal__field">
      <label class="modal__label" for="add-status">Status</label>
      <select id="add-status" class="modal__select" formControlName="status">
        <option value="active">Active</option>
        <option value="inactive">Inactive</option>
      </select>
    </div>

    <div class="modal__actions">
      <button
        class="modal__btn modal__btn--secondary"
        type="button"
        (click)="onCancel()"
        [disabled]="submitting()"
      >Cancel</button>
      <button
        class="modal__btn modal__btn--primary"
        type="submit"
        [disabled]="submitting()"
      >{{ submitting() ? 'Saving…' : 'Add Client' }}</button>
    </div>
  </form>
</div>
