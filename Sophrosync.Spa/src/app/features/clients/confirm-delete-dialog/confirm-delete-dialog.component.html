<div class="dialog-backdrop" (click)="onCancel()" aria-hidden="true"></div>

<div class="dialog" role="alertdialog" aria-modal="true" aria-labelledby="delete-dialog-title" aria-describedby="delete-dialog-desc">
  <h2 class="dialog__title" id="delete-dialog-title">Delete Client</h2>
  <p class="dialog__message" id="delete-dialog-desc">
    Are you sure you want to delete <strong>{{ client().name }}</strong>? This action cannot be undone.
  </p>
  <div class="dialog__actions">
    <button
      class="dialog__btn dialog__btn--secondary"
      type="button"
      (click)="onCancel()"
      [disabled]="deleting()"
    >Cancel</button>
    <button
      class="dialog__btn dialog__btn--danger"
      type="button"
      (click)="onConfirm()"
      [disabled]="deleting()"
    >{{ deleting() ? 'Deleting…' : 'Delete' }}</button>
  </div>
</div>
